<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clothing Store</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="navbar">
  <div class="nav-container">

    <!-- Logo -->
    <div class="logo">Rinki</div>

    <!-- Desktop Menu -->
    <nav class="nav-links">
      <a href="#">New In</a>
      <a href="#">Clothing</a>
      <a href="#">Shirts</a>
      <a href="#">Editorial</a>
    </nav>

    <!-- Right Side -->
    <div class="nav-right">
      <input type="text" placeholder="Search..." />
      <a href="#">Sign In</a>
      <a href="#">Bag (0)</a>
    </div>

    <!-- Hamburger -->
    <div class="hamburger" id="hamburger">
      ☰
    </div>

  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#">New In</a>
    <a href="#">Clothing</a>
    <a href="#">Shirts</a>
    <a href="#">Editorial</a>
    <a href="#">Sign In</a>
    <a href="#">Bag (0)</a>
  </div>


  <!--hero sections starts from here-->
  <section class="hero">

  <div class="slider">

    <!-- Slide 1 -->
    <div class="slide active">
      <img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd53" />
      <div class="overlay">
        <h1>Classic Shirts Collection</h1>
        <p>Timeless style crafted for everyday elegance</p>
        <button>Shop Now</button>
      </div>
    </div>

    <!-- Slide 2 -->
    <div class="slide">
      <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d" />
      <div class="overlay">
        <h1>Premium Outerwear</h1>
        <p>Luxury meets comfort in every stitch</p>
        <button>Explore</button>
      </div>
    </div>

    <!-- Slide 3 -->
    <div class="slide">
      <img src="https://images.unsplash.com/photo-1520975922203-bf1d79a2e4a3" />
      <div class="overlay">
        <h1>Modern Casual Wear</h1>
        <p>Effortless fashion for every moment</p>
        <button>Discover</button>
      </div>
    </div>

  </div>

  <!-- Controls -->
  <div class="controls">
    <span id="prev">❮</span>
    <span id="next">❯</span>
  </div>

</section>

<script src="index.js"></script>
</body>
</html>
